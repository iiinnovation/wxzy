services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wxzy
      POSTGRES_PASSWORD: wxzy
      POSTGRES_DB: wxzy
    volumes:
      - wxzy_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wxzy -d wxzy"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./server
    environment:
      APP_ENV: ${APP_ENV:-development}
      AUTH_MODE: ${AUTH_MODE:-dev_token}
      DATABASE_URL: postgresql+psycopg://wxzy:wxzy@db:5432/wxzy
      API_TOKEN: ${API_TOKEN:-dev-token-change-me}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      WECHAT_TIMEOUT_SECONDS: ${WECHAT_TIMEOUT_SECONDS:-5}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-2592000}
      CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  wxzy_pg:
