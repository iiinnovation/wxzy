services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wxzy
      POSTGRES_PASSWORD: wxzy
      POSTGRES_DB: wxzy
    volumes:
      - wxzy_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wxzy -d wxzy"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./server
    environment:
      DATABASE_URL: postgresql+psycopg://wxzy:wxzy@db:5432/wxzy
      API_TOKEN: ${API_TOKEN:-dev-token-change-me}
      CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  wxzy_pg:
